<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmployBux</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin:0; padding:0; }
    header { background: #2c3e50; color: white; padding: 20px; text-align: center; }
    h1 { margin:0; }
    main { padding: 20px; }
    .job { background: white; padding: 15px; margin-bottom: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .job h3 { margin-top: 0; }
    .btn { background:#3498db; color:white; border:none; padding: 8px 15px; border-radius:5px; cursor:pointer; }
    .btn:hover { background:#2980b9; }
    form input { padding: 8px; margin-bottom:10px; width: 100%; border-radius:4px; border:1px solid #ccc; }
    form button { width: 100%; }
  </style>
</head>
<body>

<header>
  <h1>💼 EmployBux</h1>
  <p>Find Jobs & Post Jobs Easily</p>
</header>

<main>
  <section>
    <h2>📢 Available Jobs</h2>

    <div class="job">
      <h3>Telegram Moderator</h3>
      <p>Salary: $50/month</p>
      <button class="btn" onclick="applyJob('Telegram Moderator')">Apply</button>
    </div>

    <div class="job">
      <h3>Graphic Designer</h3>
      <p>Salary: $100/month</p>
      <button class="btn" onclick="applyJob('Graphic Designer')">Apply</button>
    </div>
  </section>

  <hr>

  <section>
    <h2>➕ Post a Job</h2>
    <form onsubmit="submitJob(event)">
      <input type="text" id="jobTitle" placeholder="Job Title" required>
      <input type="text" id="jobSalary" placeholder="Salary" required>
      <button type="submit" class="btn">Submit</button>
    </form>
  </section>
</main>

<script>
function applyJob(title) {
  alert('You applied for: ' + title);
}

function submitJob(e) {
  e.preventDefault();
  const title = document.getElementById('jobTitle').value;
  const salary = document.getElementById('jobSalary').value;

  const jobSection = document.createElement('div');
  jobSection.className = 'job';
  jobSection.innerHTML = `<h3>${title}</h3><p>Salary: ${salary}</p><button class="btn" onclick="applyJob('${title}')">Apply</button>`;
  
  document.querySelector('main section').appendChild(jobSection);
  alert('Job Submitted!');
  document.getElementById('jobTitle').value = '';
  document.getElementById('jobSalary').value = '';
}
</script>

</body>
</html>
